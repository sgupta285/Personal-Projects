version: "3.9"

services:
  api:
    build: .
    container_name: docintel-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/docintel
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

  worker:
    build: .
    container_name: docintel-worker
    command: python -m app.worker
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/docintel
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: docintel-db
    environment:
      POSTGRES_DB: docintel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - docintel-db-data:/var/lib/postgresql/data

volumes:
  docintel-db-data:
