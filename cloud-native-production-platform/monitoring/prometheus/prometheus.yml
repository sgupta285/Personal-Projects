global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/platform-alerts.yml

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8000"]
  - job_name: catalog
    static_configs:
      - targets: ["catalog:8001"]
  - job_name: orders
    static_configs:
      - targets: ["orders:8002"]
