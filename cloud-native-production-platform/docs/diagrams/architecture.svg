<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620">
  <style>
    .box { fill:#0f172a; stroke:#334155; stroke-width:2; rx:18; ry:18; }
    .text { fill:#e2e8f0; font: 18px Arial, sans-serif; }
    .small { fill:#94a3b8; font: 14px Arial, sans-serif; }
    .line { stroke:#60a5fa; stroke-width:3; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
  </defs>
  <rect width="1040" height="620" fill="#020617"/>
  <rect class="box" x="60" y="60" width="180" height="90"/>
  <text class="text" x="98" y="105">Route 53</text>
  <text class="small" x="88" y="130">DNS entrypoint</text>

  <rect class="box" x="310" y="60" width="180" height="90"/>
  <text class="text" x="372" y="105">ALB</text>
  <text class="small" x="330" y="130">Health checks + routing</text>

  <rect class="box" x="560" y="40" width="220" height="120"/>
  <text class="text" x="612" y="100">ECS Service</text>
  <text class="small" x="586" y="128">gateway tasks behind target group</text>

  <rect class="box" x="820" y="60" width="170" height="90"/>
  <text class="text" x="858" y="105">CloudWatch</text>
  <text class="small" x="850" y="130">logs + metrics</text>

  <rect class="box" x="430" y="250" width="170" height="90"/>
  <text class="text" x="468" y="295">Catalog</text>
  <text class="small" x="452" y="320">stateless ECS service</text>

  <rect class="box" x="650" y="250" width="170" height="90"/>
  <text class="text" x="695" y="295">Orders</text>
  <text class="small" x="676" y="320">API + persistence</text>

  <rect class="box" x="620" y="430" width="220" height="100"/>
  <text class="text" x="685" y="485">RDS PostgreSQL</text>
  <text class="small" x="652" y="512">prod persistence boundary</text>

  <rect class="box" x="120" y="250" width="210" height="90"/>
  <text class="text" x="172" y="295">Frontend</text>
  <text class="small" x="155" y="320">static container or CDN origin</text>

  <line class="line" x1="240" y1="105" x2="310" y2="105"/>
  <line class="line" x1="490" y1="105" x2="560" y2="105"/>
  <line class="line" x1="780" y1="105" x2="820" y2="105"/>
  <line class="line" x1="670" y1="160" x2="515" y2="250"/>
  <line class="line" x1="670" y1="160" x2="735" y2="250"/>
  <line class="line" x1="735" y1="340" x2="730" y2="430"/>
  <line class="line" x1="330" y1="295" x2="430" y2="295"/>
  <line class="line" x1="330" y1="295" x2="560" y2="105"/>
</svg>
