version: "3.9"

services:
  bootstrap:
    build: .
    command: python scripts/bootstrap.py
    volumes:
      - .:/app

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - bootstrap

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - bootstrap
