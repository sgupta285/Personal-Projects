apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-data-processing-service
  namespace: secure-data-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-data-processing-service
  template:
    metadata:
      labels:
        app: secure-data-processing-service
    spec:
      containers:
        - name: api
          image: secure-data-processing-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: sqlite:///./secure_service.db
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
