version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - redis

  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    environment:
      PORT: 8090
    ports:
      - "8090:8090"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379
      RUN_QUEUE: agent:runs
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:5173"
    depends_on:
      - api
      - realtime
