version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - redis
    volumes:
      - ./:/workspace
    working_dir: /workspace

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
