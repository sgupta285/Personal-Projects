name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pytest
      - run: g++ -O2 -std=c++17 cpp/frame_budget_planner.cpp -o cpp/frame_budget_planner
      - run: ./cpp/frame_budget_planner 1920 1080 2
