name: backend-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Seed and refresh
        run: |
          PYTHONPATH=. python scripts/seed_usage_data.py
          PYTHONPATH=. python scripts/refresh_rollups.py
      - name: Run tests
        run: PYTHONPATH=. pytest -q
