name: ci

on:
  push:
  pull_request:

jobs:
  firmware-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system build tooling
        run: sudo apt-get update && sudo apt-get install -y build-essential make binutils
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest
      - name: Run verification smoke
        run: ./scripts/verify.sh 0.9.0
